databaseChangeLog:
  - changeSet:
      id: 001_create_users_table
      author: microgram
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
              - column:
                  name: bio
                  type: VARCHAR(500)
              - column:
                  name: avatar
                  type: VARCHAR(255)
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: post_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: followers_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: following_count
                  type: INT
                  defaultValueNumeric: 0