databaseChangeLog:
  - changeSet:
      id: 002_create_posts_table
      author: microgram
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_posts_user
                    references: users(id)
              - column:
                  name: image
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2200)
              - column:
                  name: like_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: comment_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false